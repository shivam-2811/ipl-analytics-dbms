services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ipl_db
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./data:/data
    ports:
      - "5433:5432"

  api:
    build: ./api
    ports:
      - "8000:8000"
    depends_on:
      - db

  dashboard:
    build: ./dashboard
    ports:
      - "8501:8501"
    depends_on:
      - api